name: Capstone Project Platform GCP Deployment
on: push

jobs:
    deploy:
        runs-on: ubuntu-latest

        env:
          VM_NAME: vm-platform-seed
          ZONE: asia-southeast1-a
          USER_NAME: dimanthanipun02

        permissions:
          contents: 'read'
          id-token: 'write'

        steps:
          - name: Authenticate to Google Cloud
            uses: google-github-actions/auth@v3
            with:
              workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
              service_account: ${{ secrets.GCP_SA_EMAIL }}
              project_id: ${{ secrets.GCP_PROJECT_ID }}

          - name: Set up gcloud Cloud SDK environment
            uses: google-github-actions/setup-gcloud@v3.0.1

          - name: Start the vm-platform-seed
            run: gcloud compute instances start ${{ env.VM_NAME }} --zone=${{ env.ZONE }}

          - name: Connect and Build
            run: >
              gcloud compute ssh ${{ env.USER_NAME }}@${{ env.VM_NAME }} --zone=${{ env.ZONE }}
              --command "cd Capstone-Project-Platform/ && git pull --recurse-submodules && mvn clean package"

          - name: Stop the vm-platform-seed instance
            run: gcloud compute instances stop ${{ env.VM_NAME }} --zone=${{ env.ZONE }}
              


